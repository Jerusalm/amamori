<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>☔ 雨守 PWA</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="雨守">
<link rel="apple-touch-icon" href="https://flaticon.com">

<style>
body{
    font-family:sans-serif;
    background:#eaf6ff;
    text-align:center;
    margin:0;
    padding:20px;
}
.weather{
    max-width:400px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}
.temperature{
    font-size:48px;
    font-weight:bold;
    margin:15px 0;
}
.alert-box {
    background: #f0f7ff;
    border-radius: 12px;
    padding: 15px;
    margin: 15px 0;
}
#rainAlert{
    font-size:24px;
    font-weight:bold;
    margin: 5px 0;
}
#rainTime{
    font-size:18px;
    font-weight:bold;
    color:#444;
    margin: 5px 0;
}
#warning{
    font-size:15px;
    color:#666;
    margin: 5px 0;
}
#updateStatus{
    color:#0066cc;
    font-weight:bold;
    height:24px;
    margin:10px 0;
    font-size:14px;
}
.btn-group {
    display: flex;
    justify-content: space-around;
    gap: 10px;
    margin-top: 15px;
}
button{
    flex: 1;
    padding:12px 10px;
    border:none;
    background:#0080ff;
    color:white;
    border-radius:50px;
    cursor:pointer;
    font-size:14px;
    font-weight:bold;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}
button:hover{
    background:#0066cc;
}
.radar-container {
    margin-top: 25px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}
#hourly{
    margin-top:25px;
    padding-top:15px;
    border-top:1px dashed #ccc;
}
#hourly h3 {
    font-size: 16px;
    color: #555;
    margin-bottom: 12px;
}
#hourly p{
    margin:8px auto;
    font-size:16px;
    display:flex;
    justify-content:space-between;
    max-width:180px;
}
</style>
</head>
<body>

<h1>☔ 雨守 PWA</h1>

<div class="weather">
    <p id="location">📍現在地取得中...</p>
    <div id="temperature" class="temperature">--℃</div>
    <p id="weather">取得中...</p>
    <p id="rain">現在の降水確率：--%</p>

    <div class="alert-box">
        <p id="rainAlert">✅ 雨の心配はありません</p>
        <p id="rainTime"></p>
        <p id="warning">今日は安心です</p>
    </div>

    <p id="updateStatus"></p>
    
    <div class="btn-group">
        <button onclick="playAlertSound()">🔊 音をテスト</button>
        <button onclick="requestNotificationPermission()">🔔 通知を許可</button>
    </div>

    <div class="radar-container">
        <iframe id="radarFrame" width="100%" height="240" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="about:blank"></iframe>
    </div>

    <div id="hourly"></div>
</div>

<script src="script.js"></script>
</body>
</html>
